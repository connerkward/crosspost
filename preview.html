<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 24px;
  }

  h1 { font-size: 20px; margin-bottom: 16px; color: #fff; }

  .input-section {
    background: #16213e;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 32px;
    max-width: 600px;
  }

  .input-section label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    margin-top: 12px;
  }

  .input-section label:first-child { margin-top: 0; }

  .input-section input,
  .input-section textarea {
    width: 100%;
    padding: 8px 12px;
    background: #0f3460;
    border: 1px solid #1a4a8a;
    border-radius: 6px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
  }

  .input-section textarea { height: 80px; resize: vertical; }

  .input-section input:focus,
  .input-section textarea:focus {
    outline: none;
    border-color: #4a9eff;
  }

  .previews {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
    gap: 24px;
  }

  .preview-card {
    background: #16213e;
    border-radius: 12px;
    overflow: hidden;
  }

  .preview-header {
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #1a3a5c;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .preview-header .platform-icon {
    width: 18px;
    height: 18px;
    border-radius: 4px;
  }

  .preview-body { padding: 0; }

  /* ============ HACKER NEWS ============ */
  .hn-preview {
    background: #f6f6ef;
    font-family: Verdana, Geneva, sans-serif;
    font-size: 10pt;
    color: #828282;
  }

  .hn-header {
    background: #ff6600;
    padding: 2px 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .hn-header img {
    width: 18px;
    height: 18px;
    border: 1px solid #fff;
  }

  .hn-header .hn-title-bar {
    font-weight: bold;
    font-size: 10pt;
    color: #000;
  }

  .hn-header a { color: #000; text-decoration: none; }

  .hn-body { padding: 8px 4px 8px 4px; }

  .hn-rank {
    color: #828282;
    display: inline;
    margin-right: 4px;
  }

  .hn-upvote {
    display: inline-block;
    width: 10px;
    height: 10px;
    background: transparent;
    border-left: 5px solid transparent;
    border-right: 5px solid transparent;
    border-bottom: 10px solid #828282;
    margin-right: 2px;
    vertical-align: middle;
    cursor: pointer;
  }

  .hn-storylink {
    color: #000;
    text-decoration: none;
    font-size: 10pt;
  }

  .hn-sitestr {
    font-size: 8pt;
    color: #828282;
  }

  .hn-sitestr a { color: #828282; text-decoration: none; }

  .hn-subtext {
    font-size: 7pt;
    color: #828282;
    padding-left: 32px;
    margin-top: 2px;
  }

  .hn-subtext a { color: #828282; text-decoration: none; }

  /* ============ REDDIT ============ */
  .reddit-preview {
    background: #1a1a1b;
    color: #d7dadc;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans', sans-serif;
  }

  .reddit-post {
    border: 1px solid #343536;
    border-radius: 4px;
    margin: 12px;
    background: #1a1a1b;
    display: flex;
  }

  .reddit-vote-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 4px;
    background: #161617;
    border-radius: 4px 0 0 4px;
    min-width: 40px;
  }

  .reddit-vote-btn {
    cursor: pointer;
    color: #818384;
    font-size: 20px;
    line-height: 1;
    padding: 2px;
    background: none;
    border: none;
  }

  .reddit-vote-btn:hover { color: #d7dadc; }

  .reddit-vote-count {

    font-weight: 700;
    color: #d7dadc;

  .reddit-content {

    padding: 8px;
  }

  .reddit-meta {

    color: #818384;
    margin-bottom: 4px;
  }

  .reddit-meta .reddit-sub {
    color: #d7dadc;
    font-weight: 700;
    text-decoration: none;
  }

  .reddit-meta .reddit-user {
    color: #818384;
    text-decoration: none;
  }

  .reddit-post-title {
    font-size: 18px;
    font-weight: 500;
    color: #d7dadc;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .reddit-post-title a {
    color: #4fbcff;
    font-size: 12px;
    font-weight: 400;
    text-decoration: none;
    margin-left: 4px;
  }

  .reddit-post-body {
    font-size: 14px;
    color: #d7dadc;
    line-height: 1.5;
    margin-bottom: 8px;
    max-height: 200px;

  .reddit-actions {

    gap: 4px;
  }

  .reddit-action-btn {
    font-size: 12px;
    font-weight: 700;
    color: #818384;
    padding: 4px 8px;
    border-radius: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    font-family: inherit;
  }

  .reddit-action-btn:hover { background: #2d2d2e; }

  .reddit-flair {
    display: inline-block;
    background: #272729;
    color: #d7dadc;
    font-size: 12px;
    padding: 1px 8px;
    border-radius: 12px;
    margin-left: 8px;
    font-weight: 400;
  }

  /* ============ TWITTER / X ============ */
  .twitter-preview {
    background: #000;
    color: #e7e9ea;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  .tweet {
    padding: 12px 16px;
    border-bottom: 1px solid #2f3336;
  }

  .tweet-header {
    display: flex;
    align-items: center;

    margin-bottom: 4px;
  }

  .tweet-avatar {

    height: 40px;

    flex-shrink: 0;
  }

  .tweet-author-info { flex: 1; }

  .tweet-name {

  }

  .tweet-verified {
    color: #1d9bf0;
    font-size: 16px;
  }

  .tweet-handle {
    font-size: 15px;
    color: #71767b;
  }

  .tweet-body {

    line-height: 1.4;
    color: #e7e9ea;
    margin-bottom: 12px;

  .tweet-link-card {

  .tweet-link-card-body {

  .tweet-link-card-title {

  .tweet-time {

  }

  .tweet-metrics {

    border-top: 1px solid #2f3336;
    padding-top: 12px;
    gap: 24px;
  }

  .tweet-metric {
    display: flex;
    align-items: center;
    gap: 4px;
    color: #71767b;
    font-size: 13px;
  }

  .tweet-metric svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
  }

  .tweet-actions {
    display: flex;
    justify-content: space-between;
    max-width: 400px;
    padding-top: 8px;
    border-top: 1px solid #2f3336;
    margin-top: 12px;

  .tweet-action {
    color: #71767b;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;

    border: none;

  .tweet-action svg {
    width: 18px;
    height: 18px;

  /* ============ DISCORD ============ */

  .discord-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;

  .discord-msg-content { flex: 1; }

  .discord-msg-header {

    align-items: baseline;
    gap: 8px;
    margin-bottom: 2px;

  .discord-username {
    font-weight: 600;
    font-size: 16px;
    color: #f2f3f5;
  }

  .discord-bot-tag {
    background: #5865f2;
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 3px;
    text-transform: uppercase;
  }

  .discord-timestamp {
    font-size: 12px;
    color: #949ba4;
  }

  .discord-msg-text {
    color: #dbdee1;
    font-size: 16px;
    line-height: 1.375;
    margin-bottom: 4px;
  }

  .discord-embed {
    border-left: 4px solid #5865f2;
    background: #2b2d31;
    border-radius: 4px;
    padding: 8px 16px 16px 12px;
    max-width: 520px;
    margin-top: 4px;
  }

  .discord-embed-title {
    font-size: 16px;
    font-weight: 600;
    color: #00aff4;
    margin-bottom: 8px;
    text-decoration: none;
  }

  .discord-embed-title a {
    color: #00aff4;
    text-decoration: none;
  }

  .discord-embed-title a:hover { text-decoration: underline; }

  .discord-embed-desc {
    font-size: 14px;
    color: #dbdee1;
    line-height: 1.375;
    white-space: pre-wrap;
  }

  /* ============ VIEWPORT TOGGLE ============ */
  .viewport-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .viewport-btn {
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid #1a3a5c;
    background: #16213e;
    color: #888;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }

  .viewport-btn.active {
    background: #0f3460;
    color: #fff;
    border-color: #4a9eff;
  }

  .previews.mobile .preview-card {
    max-width: 375px;
  }

  .previews.mobile .tweet,
  .previews.mobile .reddit-post,
  .previews.mobile .discord-preview-inner {
    font-size: 14px;
  }

  .previews.mobile .reddit-post-title { font-size: 16px; }
</style>
</head>

<div class="input-section">

  <label>Body</label>
  <textarea id="inp-body" oninput="render()">I built an MCP server that lets Claude read and export Apple Notes. It decodes the protobuf format from NoteStore.sqlite, handles embedded images, and works with Claude Code out of the box.</textarea>

  <label>Author / Username</label>
  <input type="text" id="inp-author" value="connerkward" oninput="render()">

  <label>Subreddit (for Reddit)</label>

<script>
function val(id) { return document.getElementById(id).value.trim(); }

function extractDomain(url) {
  try { return new URL(url).hostname; } catch { return url; }
}

function render() {
  const title = val('inp-title');
  const url = val('inp-url');
  const body = val('inp-body');
  const author = val('inp-author');
  const subreddit = val('inp-subreddit');
  const domain = extractDomain(url);
  const now = new Date();
  const timeStr = now.toLocaleString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, month: 'short', day: 'numeric', year: 'numeric' });

  // HN
  document.getElementById('hn-title').innerHTML =
    `<a href="${url}" style="color:#000;text-decoration:none">${title}</a>`;
  document.getElementById('hn-site').innerHTML =
    ` (<a href="#">${domain}</a>)`;
  document.getElementById('hn-subtext').innerHTML =
    `1 point by <a href="#">${author}</a> 0 minutes ago | <a href="#">hide</a> | <a href="#">discuss</a>`;

  // Reddit
  document.getElementById('reddit-meta').innerHTML =
    `<a class="reddit-sub" href="#">${subreddit}</a> · Posted by <a class="reddit-user" href="#">u/${author}</a> · just now`;
  document.getElementById('reddit-title').innerHTML = title +
    (url ? ` <a href="${url}">${domain}</a>` : '');
  document.getElementById('reddit-body').textContent = body;

  // Twitter
  const initial = author.charAt(0).toUpperCase();
  document.getElementById('tweet-avatar').textContent = initial;
  document.getElementById('tweet-avatar').style.cssText =
    'display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff;background:#1d9bf0';
  document.getElementById('tweet-name').innerHTML = author;
  document.getElementById('tweet-handle').textContent = `@${author}`;

  // Compose tweet: body, then URL as a link card
  document.getElementById('tweet-body').textContent = body;

  if (url) {
    document.getElementById('tweet-link-card').style.display = '';
    document.getElementById('tweet-link-domain').textContent = domain;
    document.getElementById('tweet-link-title').textContent = title;
  } else {
    document.getElementById('tweet-link-card').style.display = 'none';
  }

  document.getElementById('tweet-time').textContent = timeStr;

  // Discord
  document.getElementById('discord-avatar').textContent = initial;
  document.getElementById('discord-username').textContent = author;
  document.getElementById('discord-timestamp').textContent = 'Today at ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  document.getElementById('discord-text').textContent = url || '';
  document.getElementById('discord-embed-title').innerHTML = `<a href="${url}">${title}</a>`;
  document.getElementById('discord-embed-desc').textContent = body;
}

function setViewport(mode) {
  document.getElementById('previews').className = mode === 'mobile' ? 'previews mobile' : 'previews';
  document.querySelectorAll('.viewport-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

render();
</script>
</body>
</html>
